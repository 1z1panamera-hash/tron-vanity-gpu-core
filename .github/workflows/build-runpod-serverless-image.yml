name: Build RunPod Serverless Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "app.py"
      - "patches/**"
      - "scripts/build_vanitysearch_tron_worker.sh"
      - "tests/phase0_test_vectors.json"
      - ".github/workflows/build-runpod-serverless-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout VanitySearch source
        uses: actions/checkout@v4
        with:
          repository: JeanLucPons/VanitySearch
          ref: c8d48ce5f03f5357c0e87cbdb3e1e93cd50af88b
          path: vendor/VanitySearch
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tron-vanity-gpu-core:runpod-serverless-latest
            ghcr.io/${{ github.repository_owner }}/tron-vanity-gpu-core:runpod-serverless-${{ github.sha }}
          build-args: |
            CUDA_ARCH=sm_120
            CUDA_ARCHS=sm_80,sm_86,sm_89,sm_90,sm_120
            STEP_SIZE=4096
