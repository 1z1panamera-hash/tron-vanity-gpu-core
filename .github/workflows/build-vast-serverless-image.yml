name: Build Vast Serverless Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Dockerfile.vast-serverless"
      - "requirements-vast.txt"
      - "app.py"
      - "worker.py"
      - "vast_model_server.py"
      - "vast/**"
      - "patches/**"
      - "scripts/build_vanitysearch_tron_worker.sh"
      - "tests/phase0_test_vectors.json"
      - ".github/workflows/build-vast-serverless-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.vast-serverless
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tron-vanity-gpu-core:vast-serverless-latest
            ghcr.io/${{ github.repository_owner }}/tron-vanity-gpu-core:vast-serverless-${{ github.sha }}
          build-args: |
            CUDA_ARCH=sm_120
            CUDA_ARCHS=sm_80,sm_86,sm_89,sm_90,sm_120
            STEP_SIZE=4096
